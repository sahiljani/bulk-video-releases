name: Build Windows EXE

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cloakbrowser playwright requests python-dotenv flask google-genai sv-ttk
      - name: Install Playwright Browsers
        run: playwright install chromium
      - name: Build EXE
        run: |
          $PW_DIR = python -c "import playwright, os; print(os.path.dirname(playwright.__file__))"
          pyinstaller --onefile --windowed --add-data "$PW_DIR\driver;playwright\driver" video_pipeline_studio.py
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.3-${{ github.run_number }}
          files: dist/video_pipeline_studio.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
